<!doctype html><html lang=ja><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>📋 投稿センター｜AI万舟率ランキング</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--bd:#334155;--tx:#e2e8f0;--mut:#94a3b8;--ac:#60a5fa;--gold:#fbbf24}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--tx);max-width:680px;margin:0 auto;padding:12px}
h1{font-size:18px;margin:4px 0} h2{font-size:14px;color:var(--mut);margin:20px 0 8px;border-bottom:1px solid var(--bd);padding-bottom:5px}
a{color:var(--ac)} .nav{font-size:13px;font-weight:700;margin-bottom:8px}
.meta{font-size:12px;color:var(--mut);line-height:1.6}
.status{display:inline-block;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:700;margin-top:4px}
.s-wait{background:#3a2d12;color:var(--gold)} .s-done{background:#14321f;color:#34d399}
.card{background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:12px;margin:11px 0}
.hd{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:7px}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px}
.b-x{background:#1d3a5f;color:#93c5fd} .b-note{background:#14321f;color:#86efac} .b-paid{background:#3a2d12;color:var(--gold)}
.title{font-size:13px;font-weight:700;flex:1;min-width:60%}
.cnt{font-size:11px;color:var(--mut)} .cnt.over{color:#f87171;font-weight:700}
pre{white-space:pre-wrap;word-break:break-word;background:#0b1220;border:1px solid var(--bd);border-radius:8px;padding:10px;font-size:13px;line-height:1.65;margin:0;font-family:inherit;max-height:280px;overflow:auto}
button.copy{background:#16a34a;color:#fff;border:0;border-radius:8px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;margin-top:9px;width:100%}
button.copy:active{background:#15803d}
.hint{font-size:11px;color:var(--mut);margin-top:6px;line-height:1.5}
.empty{color:var(--mut);font-size:13px;padding:20px;text-align:center}
.reload{background:#334155;color:#e2e8f0;border:0;border-radius:7px;padding:5px 11px;font-size:12px;cursor:pointer;float:right}
</style></head><body>
<button class="reload" onclick="load()">🔄 更新</button>
<h1>📋 投稿センター</h1>
<p class="nav">🚤 <a href="manshu.html">万舟率ランキング</a>　/　⚡ <a href="manshu_chokuzen.html">直前 万舟予報</a>　/　📈 <a href="forward_track.html">戦績</a></p>
<div id="meta" class="meta">読み込み中…</div>
<div id="forecast"></div>
<div id="result"></div>
<p class="hint" style="margin-top:20px">※各ボタンで全文コピーできます。Xはトップ5の短文、noteはトップ10の観察メモです。<br>※買い目・購入推奨・回収率・利益保証は投稿文に入れません。</p>
<script>
let POSTS=[];
const MAN=10000;
function wlen(s){let n=0;for(const c of s)n+=(c.codePointAt(0)>0x7f?2:1);return n;}
function badge(ch){return ch==='X'?'<span class="badge b-x">X</span>':'<span class="badge b-note">note</span>';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function card(p){
  const wl=p.ch==='X'?wlen(p.text):0;
  const cnt=p.ch==='X'?`<span class="cnt ${wl>280?'over':''}">${wl}/280字</span>`:'';
  return `<div class="card"><div class="hd">${badge(p.ch)}<span class="title">${esc(p.title)}</span>${cnt}</div>`
    +`<pre id="t_${p.id}">${esc(p.text)}</pre>`
    +`<button class="copy" onclick="copy('${p.id}',this)">📋 この文をコピー</button></div>`;
}
async function copy(id,btn){
  const p=POSTS.find(x=>x.id===id); if(!p)return;
  try{await navigator.clipboard.writeText(p.text);}
  catch(e){const ta=document.createElement('textarea');ta.value=p.text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch(_){}ta.remove();}
  const o=btn.textContent;btn.textContent='✓ コピーしました！';btn.style.background='#0891b2';
  setTimeout(()=>{btn.textContent=o;btn.style.background='';},1500);
}
function keyOf(r){return parseInt(r.jcd,10)+'-'+parseInt(r.race_no,10);}
function pct(v){return v==null?'—':(Number(v)*100).toFixed(1)+'%';}
function yen(v){return v==null?'—':Number(v).toLocaleString()+'円';}
function trifectaOf(r){
  const t=(r.payouts&&r.payouts.trifecta&&r.payouts.trifecta[0])||null;
  if(t&&t.payout!=null)return {combination:t.combination,payout:t.payout};
  const pl={}; (r.boats||[]).forEach(b=>{if(b.racer_place_number)pl[b.racer_place_number]=b.racer_boat_number;});
  if(pl[1]&&pl[2]&&pl[3])return {combination:pl[1]+'-'+pl[2]+'-'+pl[3],payout:null};
  return null;
}
async function resultMap(date){
  const map={};
  try{
    const url='https://boatraceopenapi.github.io/results/v2/'+date.slice(0,4)+'/'+date.replace(/-/g,'')+'.json';
    const d=await (await fetch(url,{cache:'no-store'})).json();
    (d.results||[]).forEach(r=>{const t=trifectaOf(r); if(t)map[r.race_stadium_number+'-'+r.race_number]=t;});
  }catch(e){}
  return map;
}
function rateResult(r,map){
  const live=map[keyOf(r)],res=r.result||{};
  const combo=live?live.combination:res.trifecta, payout=live?live.payout:res.payout_yen;
  return {combination:combo,payout:payout,manshu:payout!=null&&payout>=MAN};
}
function evalBuy(r,map){
  const s=r.strategy&&r.strategy.buy_style_1||{},f=s.formation||{},tickets=f.tickets||[],points=Number(f.points||tickets.length||9),cost=points*100;
  const res=rateResult(r,map),check=s.result_check||{};
  let hit=check.hit,ret=check.return_yen_per_100;
  if(hit==null&&res.combination&&res.payout!=null&&tickets.length){hit=tickets.includes(res.combination);ret=hit?res.payout:0;}
  if(res.combination&&res.payout==null&&hit==null)return {done:false,hit:null,roi:null,ret:null,points};
  if(!res.combination&&hit==null)return {done:false,hit:null,roi:null,ret:null,points};
  if(ret==null)ret=hit?res.payout:0;
  return {done:true,hit:!!hit,roi:cost?ret/cost*100:null,ret:ret,points};
}
function label(r){return (r.venue_name||'')+r.race_no+'R';}
function resultText(r,map){
  const res=rateResult(r,map);
  if(!res.combination)return '結果待ち';
  if(res.payout==null)return res.combination+' 配当待ち';
  return res.combination+' '+yen(res.payout)+(res.manshu?' 万舟決着':' 1万円未満');
}
function buildPosts(role,map){
  const top=(role.races||[]).slice().sort((a,b)=>(b.scores?.manshu_probability_proxy||0)-(a.scores?.manshu_probability_proxy||0)).slice(0,10);
  let done=0,manshu=0,hit=0,cost=0,ret=0;
  top.forEach(r=>{const res=rateResult(r,map),ev=evalBuy(r,map); if(res.combination&&res.payout!=null){done++; if(res.manshu)manshu++;} if(ev.done){hit+=ev.hit?1:0; cost+=ev.points*100; ret+=ev.ret||0;}});
  const roi=cost?Math.round(ret/cost*100):null;
  const md=role.date.slice(5).replace('-','/');
  const x=[md+' 万舟率TOP5 観察メモ'];
  top.slice(0,5).forEach((r,i)=>{const res=rateResult(r,map),rate=Math.round((r.scores?.manshu_probability_proxy||0)*100);
    const result=res.payout==null?(res.combination?`結果 ${res.combination} 配当待ち`:'結果待ち'):`結果 ${res.combination} ${Number(res.payout).toLocaleString()}円${res.manshu?' 万舟':''}`;
    x.push(`${i+1}. ${label(r)} 万舟率${rate}% / ${result}`);
  });
  x.push('荒れやすさの研究用メモ。買い目・購入推奨・利益保証なし。');
  const note=['# '+md+' 万舟率TOP10 観察メモ・答え合わせ','','過去データから作った「荒れやすさ」のランキングです。買い目、購入推奨、利益保証ではありません。','','## 集計',`- 確定: ${done}/${top.length}R`,`- 万舟決着: ${manshu}件`,`- 対象: 万舟率TOP10の答え合わせ`,'','## TOP10'];
  top.forEach((r,i)=>{
    note.push('',`### ${i+1}位 ${label(r)}（${r.deadline||'締切未取得'}）`,`- 万舟率: ${pct(r.scores&&r.scores.manshu_probability_proxy)}`,`- 結果: ${resultText(r,map)}`);
  });
  note.push('','## 注意','- 万舟率は荒れやすさの目安で、的中や利益を示す数字ではありません。','- 結果・払戻は答え合わせ用で、購入判断を促すものではありません。','- 娯楽・研究用です。舟券購入を推奨しません。');
  POSTS=[{id:'x_top5',phase:'forecast',ch:'X',title:'X投稿用 万舟率TOP5',text:x.join('\n')},{id:'note_top10',phase:'forecast',ch:'note',title:'note投稿用 万舟率TOP10',text:note.join('\n')}];
  return {top,done,manshu,hit,roi,ret,cost};
}
async function load(){
  let metaDate;
  try{const p=await (await fetch('manshu_posts.json?t='+Date.now())).json(); metaDate=p.date;}catch(e){}
  const date=metaDate || new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'});
  let role;
  try{role=await (await fetch('data/output/manshu_role_ranking_'+date.replace(/-/g,'')+'.json?t='+Date.now())).json();}
  catch(e){document.getElementById('meta').innerHTML='<span class="empty">本日の万舟率トップ10データがまだありません。</span>';return;}
  const map=await resultMap(role.date);
  const s=buildPosts(role,map);
  document.getElementById('meta').innerHTML=`<b style="color:var(--tx);font-size:14px">${role.date} の万舟率TOP10</b><br>確定 ${s.done}/${s.top.length}R・万舟決着 ${s.manshu}件<br><span class="status s-done">同じランキングJSONから安全文面を生成</span>`;
  document.getElementById('forecast').innerHTML='<h2>✍️ 投稿文（Xトップ5／noteトップ10）</h2>'+POSTS.map(card).join('');
  document.getElementById('result').innerHTML='';
}
load();
</script>
</body></html>
