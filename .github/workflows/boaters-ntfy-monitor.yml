name: BOATERS manshu smartphone monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: boaters-ntfy-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pandas numpy certifi

      - name: Resolve JST date
        id: jst
        run: |
          echo "date=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_OUTPUT"
          echo "key=$(TZ=Asia/Tokyo date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Run BOATERS monitor
        env:
          BOATERS_NTFY_SERVER: ${{ secrets.BOATERS_NTFY_SERVER }}
          BOATERS_NTFY_TOPIC: ${{ secrets.BOATERS_NTFY_TOPIC || 'boat10000-codex-manshu-7d56f47f-ee5f-48f8-905a-ed6e5025b8db' }}
          BOATERS_NTFY_TOKEN: ${{ secrets.BOATERS_NTFY_TOKEN }}
        run: |
          python scripts/monitor_boaters_manshu_alerts.py \
            --date "${{ steps.jst.outputs.date }}" \
            --top-n 10 \
            --threshold 27 \
            --lookahead-minutes 20 \
            --rebuild-morning

      - name: Refresh static results and history
        run: |
          KEY="${{ steps.jst.outputs.key }}"
          YEAR="${KEY:0:4}"
          RESULTS="/tmp/boatrace_results_${KEY}.json"
          curl -fsSL --max-time 30 "https://boatraceopenapi.github.io/results/v2/${YEAR}/${KEY}.json" -o "$RESULTS" || true
          if [ -s "$RESULTS" ] && [ -e "data/output/boaters_manshu_ranking_${KEY}.json" ]; then
            python scripts/build_boaters_manshu_site_data.py \
              --source-json "data/output/boaters_manshu_ranking_${KEY}.json" \
              --out "data/output/boaters_manshu_ranking_${KEY}.json" \
              --top-n 10 \
              --results-json "$RESULTS"
          fi
          python scripts/build_boaters_manshu_history_index.py \
            --start-date 2026-05-01 \
            --end-date "${{ steps.jst.outputs.date }}" \
            --top-n 10

      - name: Persist generated monitor data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in \
            "data/output/boaters_manshu_ranking_codex_${{ steps.jst.outputs.key }}.json" \
            "data/output/boaters_manshu_ranking_${{ steps.jst.outputs.key }}.json" \
            "data/output/boaters_manshu_alerts_${{ steps.jst.outputs.key }}.json" \
            "data/output/boaters_manshu_alert_state_${{ steps.jst.outputs.key }}.json" \
            "data/output/boaters_manshu_history_index.json" \
            "data/output/manshu_daily_rank_${{ steps.jst.outputs.date }}.json" \
            "data/output/manshu_daily_rank_${{ steps.jst.outputs.date }}.csv"; do
            if [ -e "$path" ]; then
              git add "$path"
            fi
          done
          git diff --cached --quiet || git commit -m "Update BOATERS monitor data ${{ steps.jst.outputs.date }}"
          git push || true
