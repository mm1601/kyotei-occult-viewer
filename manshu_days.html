<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Codex厳選ランキング 過去検証</title>
  <style>
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:#f5f7fb;color:#172033;max-width:1100px;margin:0 auto;padding:16px;line-height:1.6}
    h1{font-size:22px;margin:0 0 8px}
    h2{font-size:17px;margin:0 0 10px;color:#991b1b}
    .muted{color:#64748b;font-size:12.5px}
    .nav{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px}
    .nav a{background:#fff;border:1px solid #d9e2ec;border-radius:8px;color:#2563eb;font-weight:800;text-decoration:none;padding:8px 11px}
    .card{background:#fff;border:1px solid #e3e8f0;border-radius:8px;padding:14px 16px;margin:0 0 14px}
    .card.main{border-left:6px solid #dc2626}
    .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    select,button{font:inherit;border:1px solid #cbd5e1;border-radius:8px;background:#fff;padding:7px 10px}
    button{font-weight:800;color:#2563eb;cursor:pointer}
    .summary{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:8px;margin-top:10px}
    .metric{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:9px 10px}
    .metric b{display:block;color:#991b1b;font-size:18px;line-height:1.2}
    .metric span{color:#9a3412;font-size:12px;font-weight:700}
    table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}
    th,td{border-top:1px solid #e5e7eb;padding:8px 7px;text-align:left;vertical-align:top}
    th{background:#f8fafc;color:#475569;font-size:12px;white-space:nowrap}
    td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
    .rate{font-weight:900;color:#dc2626}
    .hit{color:#dc2626;font-weight:900}
    .miss{color:#64748b;font-weight:800}
    .cond{color:#374151;font-size:12px;line-height:1.45;max-width:520px}
    .mini{color:#64748b;font-size:12px;line-height:1.45}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .days tbody tr{cursor:pointer}
    .days tbody tr:hover{background:#f8fafc}
    .days tbody tr.active{background:#fff7ed}
    @media(max-width:760px){
      body{padding:12px}
      .summary{grid-template-columns:repeat(2,minmax(130px,1fr))}
      table,thead,tbody,tr,th,td{display:block}
      thead{display:none}
      tr{border-top:1px solid #e5e7eb;padding:9px 0}
      td{border:0;padding:4px 0}
      td.num{text-align:left}
    }
  </style>
</head>
<body>
  <h1>Codex厳選ランキング 過去検証</h1>
  <p class="muted">今のCodex厳選ランキングを過去日付に当てた結果です。今日分は取得できている結果までを反映します。</p>
  <div class="nav">
    <a href="manshu.html">本日のランキング</a>
    <a href="manshu_codex.html">Codex版</a>
    <a href="manshu_posts.html">投稿センター</a>
    <a href="manshu_research.html">研究ノート</a>
  </div>

  <section class="card main">
    <h2>期間成績</h2>
    <div class="bar">
      <label>日付：<select id="dateSelect"></select></label>
      <button id="latestBtn" type="button">最新日へ</button>
      <span class="muted" id="periodText">読み込み中</span>
    </div>
    <div class="summary" id="summary"></div>
  </section>

  <section class="card">
    <h2 id="dayTitle">日別・厳選TOP10結果</h2>
    <div class="summary" id="daySummary"></div>
    <div class="grid">
      <div>
        <h2>Codex厳選ランキング</h2>
        <table>
          <thead><tr><th>#</th><th>レース</th><th>万舟率</th><th>結果</th><th>根拠</th></tr></thead>
          <tbody id="strictBody"></tbody>
        </table>
      </div>
      <div>
        <h2>参考：全場ランキング</h2>
        <table>
          <thead><tr><th>#</th><th>レース</th><th>万舟率</th><th>結果</th><th>根拠</th></tr></thead>
          <tbody id="raceBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section class="card">
    <h2>日別成績一覧</h2>
    <table class="days">
      <thead><tr><th>日付</th><th>厳選TOP10</th><th>TOP5</th><th>TOP3</th><th>TOP1</th><th>全場TOP10</th><th>最高配当</th></tr></thead>
      <tbody id="daysBody"></tbody>
    </table>
  </section>

<script>
"use strict";
const STATE = { index:null, selected:"", daily:{} };
const $ = id => document.getElementById(id);
const ymd = d => String(d || "").replace(/-/g, "");
const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const fmtPct = v => v == null ? "--" : Number(v).toFixed(2).replace(/\.00$/,"") + "%";
const fmtYen = v => v == null ? "--" : Number(v).toLocaleString("ja-JP") + "円";
function dataUrl(item){
  const path = item.codex_path || item.path || ("data/output/boaters_manshu_ranking_codex_" + ymd(item.date) + ".json");
  return path + "?v=codex-history-3";
}
function statLine(s){
  if(!s) return "--";
  return `${s.manshu_hits || 0}/${s.settled || 0}R ${fmtPct(s.manshu_rate_pct)}`;
}
function metric(label, s){
  const tail = s && s.day_hit_rate_pct != null ? ` / 日的中 ${fmtPct(s.day_hit_rate_pct)}` : "";
  return `<div class="metric"><b>${esc(statLine(s))}</b><span>${esc(label + tail)}</span></div>`;
}
function renderSummary(){
  const agg = STATE.index.aggregate || {};
  $("periodText").textContent = `${STATE.index.start_date}〜${STATE.index.end_date} / ${STATE.index.logic_label || ""}`;
  $("summary").innerHTML = [
    metric("厳選TOP10", agg.strict && agg.strict.top10),
    metric("厳選TOP5", agg.strict && agg.strict.top5),
    metric("厳選TOP3", agg.strict && agg.strict.top3),
    metric("厳選TOP1", agg.strict && agg.strict.top1),
    metric("参考 全場TOP10", agg.all_venue && agg.all_venue.top10)
  ].join("");
}
function renderDays(){
  const rows = (STATE.index.dates || []).slice().reverse();
  $("daysBody").innerHTML = rows.map(item => {
    const strict = item.strict || {}, all = item.all_venue || {};
    const top10 = strict.top10 || {}, top5 = strict.top5 || {}, top3 = strict.top3 || {}, top1 = strict.top1 || {}, allTop10 = all.top10 || {};
    const active = item.date === STATE.selected ? " class=\"active\"" : "";
    return `<tr data-date="${esc(item.date)}"${active}>`+
      `<td><b>${esc(item.date)}</b>${strict.fallback_from_all_venue ? '<br><span class="mini">厳選代替</span>' : ''}</td>`+
      `<td class="num">${esc(statLine(top10))}</td>`+
      `<td class="num">${esc(statLine(top5))}</td>`+
      `<td class="num">${esc(statLine(top3))}</td>`+
      `<td class="num">${esc(statLine(top1))}</td>`+
      `<td class="num">${esc(statLine(allTop10))}</td>`+
      `<td class="num">${esc(fmtYen(top10.max_payout_yen))}</td>`+
      `</tr>`;
  }).join("");
  document.querySelectorAll(".days tbody tr").forEach(tr => tr.addEventListener("click", () => chooseDate(tr.dataset.date)));
}
function resultHtml(r){
  const res = r.result || {};
  if(res.payout_yen == null) return `<span class="miss">結果待ち</span>`;
  const isHit = Number(res.payout_yen) >= 10000;
  return `<span class="${isHit ? "hit" : "miss"}">${esc(res.trifecta || "")}<br>${esc(fmtYen(res.payout_yen))}${isHit ? " 万舟" : ""}</span>`;
}
function edgeText(r){
  const labels = (r.composite_edges || []).slice(0, 2).map(e => e.label).filter(Boolean);
  const base = labels.length ? labels.join(" / ") : (r.condition || "");
  return base;
}
function raceRow(r, i){
  const deadline = r.deadline_time ? String(r.deadline_time).slice(11,16) : "--:--";
  return `<tr>`+
    `<td class="num">${i+1}</td>`+
    `<td><b>${esc(r.place_name)}${esc(r.round)}R</b><br><span class="mini">${esc(deadline)}締切 / ${esc(r.status || "")}</span></td>`+
    `<td class="num rate">${esc(fmtPct(r.manshu_rate_pct))}</td>`+
    `<td>${resultHtml(r)}</td>`+
    `<td class="cond">${esc(edgeText(r))}</td>`+
    `</tr>`;
}
function dayStats(rows, n){
  const picked = rows.slice(0, n);
  const settled = picked.filter(r => (r.result || {}).payout_yen != null);
  const hits = settled.filter(r => (r.result || {}).payout_yen >= 10000);
  return { manshu_hits:hits.length, settled:settled.length, manshu_rate_pct:settled.length ? hits.length / settled.length * 100 : null };
}
function strictRows(data){
  if((data.strict_races || []).length) return data.strict_races || [];
  const races = data.races || [];
  const okStatuses = new Set(["展示待ち","確定","厳選統合","厳選統合・展示待ち"]);
  const statusOnly = races.length && races.every(r => okStatuses.has(String(r.status || "").trim()));
  const typeStrict = races.length && races.every(r => String(r.ranking_type || "").trim() === "strict");
  return (statusOnly || typeStrict) ? races : [];
}
function renderDaily(data){
  $("dayTitle").textContent = `${data.date} の厳選ランキング結果`;
  const races = data.races || [], strict = strictRows(data);
  $("daySummary").innerHTML = [
    metric("厳選TOP10", dayStats(strict, 10)),
    metric("厳選TOP5", dayStats(strict, 5)),
    metric("厳選TOP3", dayStats(strict, 3)),
    metric("厳選TOP1", dayStats(strict, 1)),
    metric("参考 全場TOP10", dayStats(races, 10))
  ].join("");
  $("strictBody").innerHTML = strict.slice(0, 10).map(raceRow).join("") || `<tr><td colspan="5">厳選データなし</td></tr>`;
  $("raceBody").innerHTML = races.slice(0, 10).map(raceRow).join("") || `<tr><td colspan="5">データなし</td></tr>`;
}
async function chooseDate(date){
  STATE.selected = date;
  $("dateSelect").value = date;
  renderDays();
  const item = (STATE.index.dates || []).find(x => x.date === date);
  if(!item) return;
  if(!STATE.daily[date]){
    const res = await fetch(dataUrl(item), {cache:"no-store"});
    if(!res.ok) throw new Error("daily json not found: " + dataUrl(item));
    STATE.daily[date] = await res.json();
  }
  renderDaily(STATE.daily[date]);
}
async function init(){
  const res = await fetch("data/output/boaters_manshu_history_index.json?v=codex-history-3", {cache:"no-store"});
  if(!res.ok) throw new Error("history index not found");
  STATE.index = await res.json();
  const dates = (STATE.index.dates || []).map(x => x.date).sort();
  $("dateSelect").innerHTML = dates.slice().reverse().map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join("");
  $("dateSelect").addEventListener("change", e => chooseDate(e.target.value));
  $("latestBtn").addEventListener("click", () => chooseDate(dates[dates.length - 1]));
  renderSummary();
  const latestReady = (STATE.index.dates || []).slice().reverse().find(x => (((x.strict || {}).top10 || {}).selected || 0) > 0);
  await chooseDate((latestReady && latestReady.date) || dates[dates.length - 1]);
}
init().catch(err => {
  $("periodText").textContent = "読み込み失敗: " + err.message;
});
</script>
</body>
</html>
