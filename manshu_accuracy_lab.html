<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>万舟率ランキング 精度向上・回収率検証ラボ</title>
  <style>
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:#f6f7f9;color:#172033;max-width:1120px;margin:0 auto;padding:16px;line-height:1.6}
    h1{font-size:22px;margin:0 0 8px}
    h2{font-size:16px;margin:0 0 10px;color:#0f766e}
    .muted{color:#64748b;font-size:12px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin:0 0 14px}
    .guard{border-left:6px solid #0f766e}
    .nav{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px}
    .nav a{background:#fff;border:1px solid #d9e2ec;border-radius:8px;color:#2563eb;font-weight:800;text-decoration:none;padding:8px 11px}
    .summary{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:8px}
    .metric{background:#ecfeff;border:1px solid #99f6e4;border-radius:8px;padding:9px}
    .metric b{font-size:18px;color:#0f766e}
    table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
    th,td{border-top:1px solid #e5e7eb;padding:8px;text-align:left;vertical-align:top}
    th{background:#f8fafc;color:#475569;font-size:12px;white-space:nowrap}
    td.num{text-align:right;font-variant-numeric:tabular-nums}
    .warn{color:#b45309;font-weight:800}
    .rate{font-weight:900;color:#dc2626}
    @media(max-width:760px){.summary{grid-template-columns:1fr}table,thead,tbody,tr,th,td{display:block}thead{display:none}td.num{text-align:left}}
  </style>
</head>
<body>
  <h1>万舟率ランキング 精度向上・回収率検証ラボ</h1>
  <p class="muted">研究用ページです。本番の manshu.html と既存ランキングJSONは変更しません。</p>
  <div class="nav">
    <a href="manshu.html">本番ランキング</a>
    <a href="manshu_days.html">過去検証</a>
    <a href="manshu_posts.html">投稿センター</a>
  </div>

  <section class="card guard">
    <h2>採用判定</h2>
    <div class="summary" id="decision"></div>
  </section>

  <section class="card">
    <h2>候補ランキング</h2>
    <table>
      <thead><tr><th>候補#</th><th>現在#</th><th>レース</th><th>現行</th><th>候補</th><th>頭候補</th><th>クラスタ</th><th>警告</th></tr></thead>
      <tbody id="rankingBody"></tbody>
    </table>
  </section>

  <section class="card">
    <h2>現行 vs 候補</h2>
    <table>
      <thead><tr><th>ランキング</th><th>TOP</th><th>日数</th><th>消化R</th><th>万舟</th><th>万舟率</th></tr></thead>
      <tbody id="comparisonBody"></tbody>
    </table>
  </section>

<script>
"use strict";
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const pct=v=>v==null?"--":Number(v).toFixed(2).replace(/\.00$/,"")+"%";
async function loadJson(path){const res=await fetch(path+"?v=research-v2-1",{cache:"no-store"}); if(!res.ok) throw new Error(path); return await res.json();}
function decisionCard(label,value){return `<div class="metric"><b>${esc(value)}</b><br><span>${esc(label)}</span></div>`;}
async function init(){
  const date="20260625";
  const ranking=await loadJson(`data/output/research_v2/manshu_candidate_ranking_${date}.json`);
  const decision=await loadJson("data/output/research_v2/candidate_decision.json");
  const top10=(decision.comparison||[]).find(r=>r.ranking==="candidate"&&Number(r.top_k)===10)||{};
  const cur10=(decision.comparison||[]).find(r=>r.ranking==="current"&&Number(r.top_k)===10)||{};
  document.getElementById("decision").innerHTML=[
    decisionCard("判定",decision.decision||"--"),
    decisionCard("現行TOP10",pct(cur10.manshu_rate_pct)),
    decisionCard("候補TOP10",pct(top10.manshu_rate_pct)),
    decisionCard("対象日",ranking.date)
  ].join("");
  document.getElementById("rankingBody").innerHTML=(ranking.races||[]).map(r=>`<tr>
    <td class="num">${esc(r.candidate_rank)}</td>
    <td class="num">${esc(r.current_rank)}</td>
    <td>${esc(r.place_name)}${esc(r.round)}R<br><span class="muted">${esc((r.deadline_time||"").slice(11,16))}</span></td>
    <td class="num rate">${pct(r.current_manshu_rate_pct)}</td>
    <td class="num rate">${pct(r.candidate_manshu_probability_pct)}</td>
    <td>${esc((r.head_candidates||[]).join(","))}</td>
    <td>${esc(r.cluster_id)}<br><span class="muted">${esc(r.cluster_similarity)}</span></td>
    <td class="warn">${esc((r.missing_warnings||[]).join(" / "))}</td>
  </tr>`).join("");
  document.getElementById("comparisonBody").innerHTML=(decision.comparison||[]).map(r=>`<tr>
    <td>${esc(r.ranking)}</td>
    <td class="num">${esc(r.top_k)}</td>
    <td class="num">${esc(r.days)}</td>
    <td class="num">${esc(r.settled)}</td>
    <td class="num">${esc(r.manshu_hits)}</td>
    <td class="num rate">${pct(r.manshu_rate_pct)}</td>
  </tr>`).join("");
}
init().catch(err=>{document.body.insertAdjacentHTML("beforeend",`<p class="warn">読み込み失敗: ${esc(err.message)}</p>`);});
</script>
</body>
</html>
